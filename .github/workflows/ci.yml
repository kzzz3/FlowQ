name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-msvc-vcpkg:
    name: Windows MSVC vcpkg
    runs-on: windows-2025

    env:
      PRESET: windows-msvc-vcpkg
      VCPKG_ROOT: C:\vcpkg
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      CTEST_OUTPUT_ON_FAILURE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          ctest --version
          & "$env:VCPKG_ROOT\vcpkg.exe" version

      - name: Configure FlowQ
        shell: pwsh
        run: cmake --preset $env:PRESET

      - name: Build FlowQ
        shell: pwsh
        run: cmake --build --preset $env:PRESET

      - name: Test FlowQ
        shell: pwsh
        run: ctest --preset $env:PRESET --timeout 10

      - name: Install FlowQ package
        shell: pwsh
        run: |
          cmake --install build/windows-msvc-vcpkg `
            --config Debug `
            --prefix build/install-flowq

      - name: Configure package consumer
        shell: pwsh
        run: |
          cmake -S tests/package-consumer `
            -B build/package-consumer `
            -G "Visual Studio 18 2026" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="$env:GITHUB_WORKSPACE/build/install-flowq"

      - name: Build package consumer
        shell: pwsh
        run: cmake --build build/package-consumer --config Debug

      - name: Run package consumer
        shell: pwsh
        run: .\build\package-consumer\Debug\flowq_package_consumer.exe

  linux-gcc:
    name: Linux GCC
    runs-on: ubuntu-latest

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      CTEST_OUTPUT_ON_FAILURE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
          ~/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Configure FlowQ
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DFLOWQ_BUILD_TESTS=ON \
            -DFLOWQ_BUILD_EXAMPLES=ON

      - name: Build FlowQ
        run: cmake --build build

      - name: Test FlowQ
        run: ctest --test-dir build -C Debug --timeout 10 --output-on-failure

      - name: Install FlowQ package
        run: cmake --install build --config Debug --prefix build/install-flowq

      - name: Configure package consumer
        run: |
          cmake -S tests/package-consumer -B build/package-consumer -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/build/install-flowq"

      - name: Build package consumer
        run: cmake --build build/package-consumer

      - name: Run package consumer
        run: ./build/package-consumer/flowq_package_consumer

  linux-clang:
    name: Linux Clang
    runs-on: ubuntu-latest

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      CTEST_OUTPUT_ON_FAILURE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
          ~/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Configure FlowQ
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DFLOWQ_BUILD_TESTS=ON \
            -DFLOWQ_BUILD_EXAMPLES=ON

      - name: Build FlowQ
        run: cmake --build build

      - name: Test FlowQ
        run: ctest --test-dir build -C Debug --timeout 10 --output-on-failure

  macos-clang:
    name: macOS Clang
    runs-on: macos-latest

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2
      CTEST_OUTPUT_ON_FAILURE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
          ~/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV

      - name: Configure FlowQ
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DFLOWQ_BUILD_TESTS=ON \
            -DFLOWQ_BUILD_EXAMPLES=ON

      - name: Build FlowQ
        run: cmake --build build

      - name: Test FlowQ
        run: ctest --test-dir build -C Debug --timeout 10 --output-on-failure

      - name: Install FlowQ package
        run: cmake --install build --config Debug --prefix build/install-flowq

      - name: Configure package consumer
        run: |
          cmake -S tests/package-consumer -B build/package-consumer -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/build/install-flowq"

      - name: Build package consumer
        run: cmake --build build/package-consumer

      - name: Run package consumer
        run: ./build/package-consumer/flowq_package_consumer
