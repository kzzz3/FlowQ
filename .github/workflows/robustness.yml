name: Robustness

# Runs sanitizer-instrumented builds and fuzz targets to catch memory errors,
# undefined behavior, and logic bugs before they reach production.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sanitize:
    # ASan (AddressSanitizer): detects use-after-free, buffer overflows, stack
    #   overflow, and other memory safety violations at runtime.
    # UBSan (UndefinedBehaviorSanitizer): catches signed integer overflow, null
    #   pointer dereference, misaligned access, and other undefined behavior
    #   per the C++ standard.
    # -fno-omit-frame-pointer: preserves frame pointers in all functions so that
    #   sanitizer stack traces include full call chains, greatly improving
    #   diagnosability of any reported issue.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
          ~/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
      - name: Validate sanitizer preset
        run: ./scripts/validate-sanitizers.sh
      - name: Release readiness smoke gate
        run: ./scripts/check-release-readiness.sh --skip-build

  fuzz:
    # Builds fuzz targets with libFuzzer + ASan + UBSan, then runs each for a
    # short smoke period to catch crashes and sanitizer violations in codec
    # paths exposed to random input.
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
          ~/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
      - name: Configure with fuzzing
        run: cmake --preset linux-fuzz-libfuzzer
      - name: Build fuzz targets
        run: cmake --build --preset linux-fuzz-libfuzzer
      - name: Run packet header fuzz (short)
        run: timeout 60 ./build/linux-fuzz-libfuzzer/flowq_fuzz_packet_header -max_total_time=30
      - name: Run frame codec fuzz (short)
        run: timeout 60 ./build/linux-fuzz-libfuzzer/flowq_fuzz_frame_decode -max_total_time=30
      - name: Run QPACK fuzz (short)
        run: timeout 60 ./build/linux-fuzz-libfuzzer/flowq_fuzz_qpack -max_total_time=30
