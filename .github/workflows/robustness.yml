name: Robustness

# Runs sanitizer-instrumented builds and fuzz targets to catch memory errors,
# undefined behavior, and logic bugs before they reach production.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  sanitize:
    # ASan (AddressSanitizer): detects use-after-free, buffer overflows, stack
    #   overflow, and other memory safety violations at runtime.
    # UBSan (UndefinedBehaviorSanitizer): catches signed integer overflow, null
    #   pointer dereference, misaligned access, and other undefined behavior
    #   per the C++ standard.
    # -fno-omit-frame-pointer: preserves frame pointers in all functions so that
    #   sanitizer stack traces include full call chains, greatly improving
    #   diagnosability of any reported issue.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
      - name: Configure with sanitizers
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DFLOWQ_BUILD_TESTS=ON \
            -DFLOWQ_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build build
      - name: Test with sanitizers
        run: ctest --test-dir build -C Debug --timeout 30 --output-on-failure

  fuzz:
    # Builds fuzz targets with libFuzzer + ASan + UBSan, then runs each for a
    # short smoke period to catch crashes and sanitizer violations in codec
    # paths exposed to random input.
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
      - name: Configure with fuzzing
        run: |
          cmake -S . -B build-fuzz -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DFLOWQ_BUILD_FUZZ=ON \
            -DFLOWQ_BUILD_TESTS=OFF \
            -DFLOWQ_BUILD_EXAMPLES=OFF
      - name: Build fuzz targets
        run: cmake --build build-fuzz
      - name: Run packet header fuzz (short)
        run: timeout 60 ./build-fuzz/flowq_packet_header_fuzz -max_total_time=30
      - name: Run frame codec fuzz (short)
        run: timeout 60 ./build-fuzz/flowq_frame_codec_fuzz -max_total_time=30
      - name: Run QPACK fuzz (short)
        run: timeout 60 ./build-fuzz/flowq_fuzz_qpack -max_total_time=30
